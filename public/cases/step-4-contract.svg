<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 3s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-doc" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .doc-line { opacity: 0.5; animation: docPulse calc(var(--speed)*0.5) ease-in-out infinite alternate; }
                            .doc-sign { stroke-dasharray: 25; stroke-dashoffset: 25; animation: signDoc var(--speed) cubic-bezier(0.65, 0, 0.35, 1) infinite; }
                            @keyframes docPulse { 0% { opacity: 0.2; } 100% { opacity: 0.6; } }
                            @keyframes signDoc { 0%, 20% { stroke-dashoffset: 25; } 60%, 100% { stroke-dashoffset: 0; } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-doc)">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="#45A29E"></path>
                            <path d="M14 2v6h6" stroke="#45A29E"></path>
                            <line x1="8" y1="11" x2="16" y2="11" class="doc-line" style="animation-delay: 0s;"></line>
                            <line x1="8" y1="14" x2="14" y2="14" class="doc-line" style="animation-delay: 0.2s;"></line>
                            <path d="M8 18c1-2 2-1 3 0s1-2 2 0 2-2 3-1" stroke-width="1.5" class="doc-sign"></path>
                        </g>
                    </svg>