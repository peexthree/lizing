<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 3s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-spark" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .spark-core { animation: corePulse var(--speed) ease-in-out infinite alternate; transform-origin: center; }
                            .spark-ray { stroke-dasharray: 10; stroke-dashoffset: 10; animation: shootRay var(--speed) cubic-bezier(0.4, 0, 0.2, 1) infinite; }
                            @keyframes corePulse { 0% { transform: scale(0.8) rotate(0deg); opacity: 0.5; } 100% { transform: scale(1.2) rotate(45deg); opacity: 1; filter: drop-shadow(0 0 5px #66FCF1); } }
                            @keyframes shootRay { 0%, 20% { stroke-dashoffset: 10; opacity: 1; } 60%, 100% { stroke-dashoffset: -10; opacity: 0; } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-spark)">
                            <path d="M12 8L16 12L12 16L8 12Z" fill="rgba(102, 252, 241, 0.2)" class="spark-core"></path>
                            <line x1="12" y1="4" x2="12" y2="0" class="spark-ray" style="animation-delay: 0s;"></line>
                            <line x1="12" y1="20" x2="12" y2="24" class="spark-ray" style="animation-delay: 0.2s;"></line>
                            <line x1="20" y1="12" x2="24" y2="12" class="spark-ray" style="animation-delay: 0.4s;"></line>
                            <line x1="4" y1="12" x2="0" y2="12" class="spark-ray" style="animation-delay: 0.6s;"></line>
                            <!-- Диагональные декоративные -->
                            <line x1="18" y1="6" x2="20" y2="4" stroke="#45A29E" opacity="0.5"></line>
                            <line x1="6" y1="18" x2="4" y2="20" stroke="#45A29E" opacity="0.5"></line>
                        </g>
                    </svg>