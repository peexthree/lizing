<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 2s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-trend" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .trend-line { stroke-dasharray: 40; stroke-dashoffset: 40; animation: drawTrend var(--speed) cubic-bezier(0.4, 0, 0.2, 1) infinite; }
                            .trend-arrow { opacity: 0; animation: popArrow var(--speed) cubic-bezier(0.4, 0, 0.2, 1) infinite; }
                            @keyframes drawTrend { 0%, 10% { stroke-dashoffset: 40; } 50%, 100% { stroke-dashoffset: 0; } }
                            @keyframes popArrow { 0%, 45% { opacity: 0; transform: scale(0.5) translate(-2px, 2px); } 55%, 100% { opacity: 1; transform: scale(1) translate(0, 0); } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-trend)">
                            <path d="M3 19h18" stroke="#45A29E" opacity="0.3"></path>
                            <path d="M3 15l6-6 4 4 7-7" class="trend-line"></path>
                            <path d="M16 6h4v4" class="trend-arrow"></path>
                        </g>
                    </svg>