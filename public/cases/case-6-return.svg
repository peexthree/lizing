<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 4s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-cash" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .cash-cycle { transform-origin: center; animation: spinCycle var(--speed) linear infinite; }
                            .cash-center { animation: pulseCash calc(var(--speed) * 0.5) ease-in-out infinite alternate; }
                            @keyframes spinCycle { 100% { transform: rotate(360deg); } }
                            @keyframes pulseCash { 0% { opacity: 0.6; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 4px #66FCF1); } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-cash)">
                            <!-- Цикличные стрелки -->
                            <g class="cash-cycle" stroke="#45A29E">
                                <path d="M4 12A8 8 0 0 1 18.3 7"></path>
                                <path d="M18 3v4h-4"></path>
                                <path d="M20 12a8 8 0 0 1-14.3 5"></path>
                                <path d="M6 21v-4h4"></path>
                            </g>
                            <!-- Символ Рубля (Деньги в оборот) -->
                            <g class="cash-center" style="transform-origin: 12px 12px;">
                                <path d="M9 16h6" stroke-width="1.5"></path>
                                <path d="M11 6h3a3 3 0 0 1 0 6h-3v6" stroke-width="1.5"></path>
                            </g>
                        </g>
                    </svg>