<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 3s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-appr" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .appr-ring { stroke-dasharray: 60; stroke-dashoffset: 60; animation: fillRing var(--speed) ease-in-out infinite; }
                            .appr-check { stroke-dasharray: 20; stroke-dashoffset: 20; animation: drawCheck var(--speed) ease-in-out infinite; animation-delay: calc(var(--speed) * 0.3); }
                            @keyframes fillRing { 0%, 10% { stroke-dashoffset: 60; } 50%, 100% { stroke-dashoffset: 0; } }
                            @keyframes drawCheck { 0%, 20% { stroke-dashoffset: 20; } 50%, 100% { stroke-dashoffset: 0; } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-appr)">
                            <circle cx="12" cy="12" r="10" stroke="#45A29E" opacity="0.3"></circle>
                            <circle cx="12" cy="12" r="10" class="appr-ring" transform="rotate(-90 12 12)"></circle>
                            <path d="M8 12l3 3 6-6" stroke-width="2" class="appr-check"></path>
                        </g>
                    </svg>