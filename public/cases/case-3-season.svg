<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 3s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-cal" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .cal-mark { stroke-dasharray: 12; stroke-dashoffset: 12; animation: drawMark var(--speed) cubic-bezier(0.6, 0, 0.4, 1) infinite; }
                            .cal-line { opacity: 0.5; animation: pulseLine var(--speed) infinite alternate; }
                            @keyframes drawMark { 0%, 30% { stroke-dashoffset: 12; } 60%, 100% { stroke-dashoffset: 0; } }
                            @keyframes pulseLine { 0% { opacity: 0.2; } 100% { opacity: 0.8; } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-cal)">
                            <rect x="4" y="6" width="16" height="14" rx="2" stroke="#45A29E"></rect>
                            <path d="M4 10h16" stroke="#45A29E"></path>
                            <path d="M8 4v4M16 4v4" stroke="#66FCF1" class="cal-line"></path>
                            <path d="M9 15l2 2 4-4" stroke-width="2" class="cal-mark"></path>
                        </g>
                    </svg>