<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 3s; --speed-slow: 5s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-truck" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .truck-wheel { transform-origin: center; animation: spin var(--speed) linear infinite; }
                            .truck-headlight { animation: pulse var(--speed-slow) cubic-bezier(0.4, 0, 0.2, 1) infinite; }
                            .truck-road { stroke-dasharray: 4 4; animation: moveRoad var(--speed) linear infinite; }
                            @keyframes spin { 100% { transform: rotate(360deg); } }
                            @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; filter: drop-shadow(0 0 4px #66FCF1); } }
                            @keyframes moveRoad { 100% { stroke-dashoffset: -8; } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-truck)">
                            <path d="M3 15V7a2 2 0 0 1 2-2h9l4 4v6"></path>
                            <path d="M14 9h4l2 3"></path>
                            <circle cx="7" cy="15" r="2" class="truck-wheel" style="transform-origin: 7px 15px;"></circle>
                            <path d="M7 15v-1" class="truck-wheel" style="transform-origin: 7px 15px;"></path>
                            <circle cx="17" cy="15" r="2" class="truck-wheel" style="transform-origin: 17px 15px;"></circle>
                            <path d="M17 15v-1" class="truck-wheel" style="transform-origin: 17px 15px;"></path>
                            <path d="M22 13h2" stroke="#66FCF1" class="truck-headlight"></path>
                            <path d="M1 19h22" stroke="#45A29E" stroke-width="1" class="truck-road"></path>
                        </g>
                    </svg>