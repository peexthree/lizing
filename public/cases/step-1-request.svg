<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 2s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-req" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .req-wave { stroke-dasharray: 10; stroke-dashoffset: 10; animation: signalOut var(--speed) linear infinite; }
                            .req-screen { animation: screenPulse var(--speed) ease-in-out infinite alternate; }
                            @keyframes signalOut { 0% { stroke-dashoffset: 10; opacity: 1; transform: translateY(0); } 100% { stroke-dashoffset: -10; opacity: 0; transform: translateY(-4px); } }
                            @keyframes screenPulse { 0% { fill: rgba(102, 252, 241, 0.1); } 100% { fill: rgba(102, 252, 241, 0.4); } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-req)">
                            <rect x="7" y="8" width="10" height="16" rx="2" stroke="#45A29E"></rect>
                            <rect x="9" y="11" width="6" height="8" rx="1" stroke="none" class="req-screen"></rect>
                            <path d="M12 21h.01" stroke-width="2"></path>
                            <path d="M12 5v-3M9 4l-2-2M15 4l2-2" class="req-wave"></path>
                        </g>
                    </svg>