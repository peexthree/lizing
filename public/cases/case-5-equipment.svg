<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 3s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-bldg" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .bldg-light { animation: blinkLight calc(var(--speed) * 0.4) infinite alternate; }
                            .bldg-scan { transform-origin: bottom; animation: growBar var(--speed) ease-in-out infinite alternate; }
                            @keyframes blinkLight { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
                            @keyframes growBar { 0% { transform: scaleY(0.2); opacity: 0.4; } 100% { transform: scaleY(1); opacity: 1; } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-bldg)">
                            <path d="M2 22V10l6 4V9l6 4V8l8 5v9H2z" stroke="#45A29E"></path>
                            <rect x="6" y="16" width="2" height="6" class="bldg-scan"></rect>
                            <rect x="12" y="15" width="2" height="7" class="bldg-scan" style="animation-delay: calc(var(--speed) * -0.3);"></rect>
                            <rect x="18" y="17" width="2" height="5" class="bldg-scan" style="animation-delay: calc(var(--speed) * -0.6);"></rect>
                            <circle cx="21" cy="6" r="1" fill="#66FCF1" class="bldg-light"></circle>
                        </g>
                    </svg>