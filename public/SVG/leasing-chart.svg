<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 3s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-chart" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .chart-line { stroke-dasharray: 40; stroke-dashoffset: 40; animation: drawLine var(--speed) cubic-bezier(0.65, 0, 0.35, 1) infinite; }
                            .chart-dot { opacity: 0; animation: fadeDot var(--speed) cubic-bezier(0.65, 0, 0.35, 1) infinite; }
                            @keyframes drawLine { 0% { stroke-dashoffset: 40; } 50%, 100% { stroke-dashoffset: 0; } }
                            @keyframes fadeDot { 0%, 40% { opacity: 0; transform: scale(0.5); } 50%, 100% { opacity: 1; transform: scale(1); } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-chart)">
                            <path d="M4 4v16h16" stroke="#45A29E"></path>
                            <path d="M4 16l5-5 4 3 6-8" class="chart-line"></path>
                            <circle cx="9" cy="11" r="1.5" fill="#66FCF1" class="chart-dot" style="animation-delay: calc(var(--speed) * 0.15); transform-origin: 9px 11px;"></circle>
                            <circle cx="13" cy="14" r="1.5" fill="#66FCF1" class="chart-dot" style="animation-delay: calc(var(--speed) * 0.25); transform-origin: 13px 14px;"></circle>
                            <circle cx="19" cy="6" r="2" fill="#66FCF1" class="chart-dot" style="animation-delay: calc(var(--speed) * 0.4); transform-origin: 19px 6px; box-shadow: 0 0 5px #66FCF1;"></circle>
                        </g>
                    </svg>