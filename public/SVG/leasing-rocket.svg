<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 3s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-rocket" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .rocket-body { animation: floatRocket var(--speed) ease-in-out infinite alternate; }
                            .rocket-flame { transform-origin: center bottom; animation: flickerFlame calc(var(--speed) * 0.15) ease-in-out infinite alternate; }
                            @keyframes floatRocket { 0% { transform: translateY(2px) translateX(-2px); } 100% { transform: translateY(-2px) translateX(2px); } }
                            @keyframes flickerFlame { 0% { transform: scaleY(0.8); opacity: 0.6; } 100% { transform: scaleY(1.3); opacity: 1; } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-rocket)">
                            <g class="rocket-body">
                                <path d="M20 4c0 0-4-1-8 3L5 14l-2 5 5-2 7-7c4-4 3-8 3-8z"></path>
                                <path d="M14 9l-5 5" stroke="#45A29E"></path>
                                <circle cx="13" cy="11" r="1.5" fill="#66FCF1"></circle>
                                <path d="M5 14l-3 3M10 19l-3 3" class="rocket-flame"></path>
                            </g>
                        </g>
                    </svg>