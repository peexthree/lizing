<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 3s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-shield" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                            <clipPath id="shield-clip">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            </clipPath>
                        </defs>
                        <style>
                            .shield-scan { transform: translateY(-100%); animation: scan var(--speed) linear infinite; }
                            .shield-core { animation: pulseCore var(--speed) ease-in-out infinite alternate; }
                            @keyframes scan { 0% { transform: translateY(-10px); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(24px); opacity: 0; } }
                            @keyframes pulseCore { 0% { opacity: 0.3; stroke-width: 1; } 100% { opacity: 0.8; stroke-width: 2; } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-shield)">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#45A29E"></path>
                            <path d="M12 16l-3-2V9l3-2 3 2v5z" class="shield-core"></path>
                            <g clip-path="url(#shield-clip)">
                                <line x1="0" y1="0" x2="24" y2="0" stroke="#66FCF1" stroke-width="2" class="shield-scan"></line>
                            </g>
                        </g>
                    </svg>