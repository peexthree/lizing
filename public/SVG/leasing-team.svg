<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 2.5s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-team" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .team-side { animation: pulseSide var(--speed) ease-in-out infinite alternate; }
                            .team-center { animation: floatCenter var(--speed) ease-in-out infinite alternate; }
                            @keyframes pulseSide { 0% { opacity: 0.3; transform: scale(0.95); } 100% { opacity: 0.8; transform: scale(1); } }
                            @keyframes floatCenter { 0% { transform: translateY(0); filter: drop-shadow(0 0 2px #66FCF1); } 100% { transform: translateY(-2px); filter: drop-shadow(0 0 6px #66FCF1); } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-team)">
                            <!-- Center Person -->
                            <g class="team-center" style="transform-origin: 12px 14px;">
                                <circle cx="12" cy="8" r="3"></circle>
                                <path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"></path>
                            </g>
                            <!-- Left Person -->
                            <g class="team-side" stroke="#45A29E" style="transform-origin: 5px 16px; animation-delay: 0s;">
                                <circle cx="5" cy="10" r="2"></circle>
                                <path d="M1 21v-1a3 3 0 0 1 3-3h2"></path>
                            </g>
                            <!-- Right Person -->
                            <g class="team-side" stroke="#45A29E" style="transform-origin: 19px 16px; animation-delay: calc(var(--speed) * -0.5);">
                                <circle cx="19" cy="10" r="2"></circle>
                                <path d="M23 21v-1a3 3 0 0 0-3-3h-2"></path>
                            </g>
                        </g>
                    </svg>