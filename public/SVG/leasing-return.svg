<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="100%" height="100%" style="--speed: 3s; transition: all 0.3s ease; overflow: visible;">
                        <defs>
                            <filter id="glow-ret" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
                                <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                            </filter>
                        </defs>
                        <style>
                            .ret-shield { animation: breatheShield var(--speed) ease-in-out infinite alternate; }
                            .ret-check { stroke-dasharray: 20; stroke-dashoffset: 20; animation: drawRetCheck var(--speed) cubic-bezier(0.65, 0, 0.35, 1) infinite; }
                            @keyframes breatheShield { 0% { opacity: 0.6; stroke-width: 1.2; filter: drop-shadow(0 0 1px #45A29E); } 100% { opacity: 1; stroke-width: 1.5; filter: drop-shadow(0 0 5px #66FCF1); } }
                            @keyframes drawRetCheck { 0%, 20% { stroke-dashoffset: 20; } 50%, 100% { stroke-dashoffset: 0; } }
                        </style>
                        <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-ret)">
                            <path d="M12 21.5c-4.5-2.5-8-7.5-8-12V6l8-3 8 3v3.5c0 4.5-3.5 9.5-8 12z" stroke="#45A29E" stroke-width="1.5" class="ret-shield" style="transform-origin: 12px 12px;"></path>
                            <path d="M8 11.5l3 3 6-6" stroke="#66FCF1" stroke-width="2" class="ret-check"></path>
                        </g>
                    </svg>