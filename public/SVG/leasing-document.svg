                            @keyframes docPulse { 0% { opacity: 0.3; } 100% { opacity: 0.8; } }
                        </style>
                        <g stroke="#66FCF1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-doc)">
